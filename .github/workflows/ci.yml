name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: lint + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev,openai,pg]"
      - name: Lint
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Unit + MCP round-trip tests
        run: pytest

  pgvector-integration:
    name: pgvector integration (real Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: docqa
          POSTGRES_PASSWORD: docqa
          POSTGRES_DB: docqa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U docqa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://docqa:docqa@localhost:5432/docqa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev,pg]"
      - name: pgvector store battery
        run: pytest -m pgvector
      - name: End-to-end on pgvector — ingest sample corpus, gate on recall@5
        env:
          DOCQA_STORE: pgvector
          DOCQA_EMBEDDINGS: hash
        run: |
          docqa-ingest index --sample
          docqa-ingest stats
          docqa-eval --min-recall5 0.9
